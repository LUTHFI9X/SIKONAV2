name: deploy-frontend-netlify

on:
  push:
    branches:
      - main
    paths:
      - frontend/**
      - netlify.toml
      - .github/workflows/deploy-frontend-netlify.yml
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Frontend to Netlify
    runs-on: ubuntu-latest
    if: ${{ secrets.NETLIFY_AUTH_TOKEN != '' && secrets.NETLIFY_SITE_ID != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: https://sikonav2-production.up.railway.app/api
          VITE_API_FALLBACK_URL: /api
          VITE_REVERB_APP_KEY: ${{ secrets.VITE_REVERB_APP_KEY || 'qothysbfflfhyoj9xbt9' }}
          VITE_REVERB_HOST: ${{ secrets.VITE_REVERB_HOST || '' }}
          VITE_REVERB_PORT: ${{ secrets.VITE_REVERB_PORT || '443' }}
          VITE_REVERB_SCHEME: ${{ secrets.VITE_REVERB_SCHEME || 'https' }}

      - name: Deploy to Netlify
        run: npx netlify-cli deploy --prod --dir=frontend/dist --site="$NETLIFY_SITE_ID" --auth="$NETLIFY_AUTH_TOKEN"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}