    <line x1="0" y1="0" x2="-48" y2="-38" stroke="#1a1a6e" stroke-width="5.5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-15" y2="-55" stroke="#1a1a6e" stroke-width="5.5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="25" y2="-50" stroke="#1a1a6e" stroke-width="5.5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="55" y2="-25" stroke="#1a1a6e" stroke-width="5.5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="60" y2="15" stroke="#1a1a6e" stroke-width="5.5" stroke-linecap="round"/>
