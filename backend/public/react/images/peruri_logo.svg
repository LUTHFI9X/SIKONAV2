  </g>
  <!-- PERURI Text -->
  <text x="50" y="155" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="80" letter-spacing="18" fill="#1a1a6e">PERURI</text>
